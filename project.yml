name: CalendarBridge
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    macOS: 13.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.local.CalendarBridge
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: CalendarBridge
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSAppleEventsUsageDescription: CalendarBridge needs permission to read events from Microsoft Outlook.
    INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: CalendarBridge needs calendar access to create and update events in your selected Apple Calendar.
    INFOPLIST_KEY_NSCalendarsUsageDescription: CalendarBridge needs calendar access to create and update events in your selected Apple Calendar.
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    CODE_SIGN_STYLE: Automatic
packages: {}
targets:
  CalendarBridge:
    type: application
    platform: macOS
    sources:
      - path: CalendarBridge
    settings:
      base:
        PRODUCT_NAME: CalendarBridge
        MACOSX_DEPLOYMENT_TARGET: 13.0
        SWIFT_EMIT_LOC_STRINGS: NO
        SUPPORTS_MACCATALYST: NO
schemes:
  CalendarBridge:
    build:
      targets:
        CalendarBridge: all
    run:
      config: Debug
    archive:
      config: Release
