name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    env:
      APP_NAME: CalendarBridge
      SCHEME: CalendarBridge
      PROJECT_PATH: CalendarBridge.xcodeproj
      CONFIGURATION: Release
      DERIVED_DATA: ${{ github.workspace }}/build
      DIST_DIR: ${{ github.workspace }}/dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build unsigned Release app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DIST_DIR"

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION/$APP_NAME.app"
          test -d "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Package ZIP
        shell: bash
        run: |
          set -euo pipefail
          ZIP_PATH="$DIST_DIR/${APP_NAME}-${GITHUB_REF_NAME}-macos-unsigned.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"

      - name: Package DMG
        shell: bash
        run: |
          set -euo pipefail
          STAGING_DIR="$RUNNER_TEMP/dmg-root"
          DMG_PATH="$DIST_DIR/${APP_NAME}-${GITHUB_REF_NAME}-macos-unsigned.dmg"

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "$DIST_DIR"
          shasum -a 256 *.zip *.dmg > SHA256SUMS.txt

      - name: Render release notes
        shell: bash
        run: |
          set -euo pipefail
          TEMPLATE=".github/release-notes-template.md"
          OUTPUT="$DIST_DIR/RELEASE_NOTES.md"

          cp "$TEMPLATE" "$OUTPUT"
          sed -i '' "s/{{TAG}}/${GITHUB_REF_NAME}/g" "$OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ github.ref_name }}
          path: |
            dist/*.zip
            dist/*.dmg
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.md
          if-no-files-found: error

      - name: Create/Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.zip
            dist/*.dmg
            dist/SHA256SUMS.txt
          draft: false
          prerelease: true
          generate_release_notes: true
